<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="JavaR">
  <title>JavaR  Zero-Restart Java</title>
  <defs>
    <linearGradient id="rustMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8A4C"/>
      <stop offset="45%" stop-color="#E06C75"/>
      <stop offset="100%" stop-color="#B7410E"/>
    </linearGradient>
    <linearGradient id="beanGlow" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0096C7"/>
    </linearGradient>
    <radialGradient id="space" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3A404C"/>
      <stop offset="55%" stop-color="#282C34"/>
      <stop offset="100%" stop-color="#14161B"/>
    </radialGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space stage -->
  <rect width="512" height="512" rx="96" fill="url(#space)"/>

  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#00E5FF" stroke-opacity="0.22" stroke-width="3"
          stroke-dasharray="14 18"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#E06C75" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- Glowing coffee bean (Java) -->
  <g filter="url(#neon)" transform="translate(292 168)">
    <ellipse cx="52" cy="88" rx="46" ry="78" fill="url(#beanGlow)" opacity="0.95"/>
    <path d="M52 22 C68 50 68 126 52 154 C36 126 36 50 52 22Z" fill="#282C34" opacity="0.55"/>
    <ellipse cx="40" cy="60" rx="10" ry="16" fill="#FFFFFF" opacity="0.25"/>
  </g>

  <!-- Metallic stylized R wrapping the bean -->
  <g filter="url(#soft)">
    <path fill="url(#rustMetal)" d="
      M96 400
      V112
      h128
      c86 0 140 46 140 122
      0 56 -30 98 -84 116
      l92 50
      h-86
      l-78 -44
      H168
      V400
      H96
      Z
      M168 274
      h52
      c38 0 62 -20 62 -52
      s-24 -52 -62 -52
      H168
      V274
      Z"/>
  </g>

  <!-- Cyberpunk spark -->
  <circle cx="408" cy="118" r="12" fill="#7DF9FF" filter="url(#neon)"/>
  <circle cx="408" cy="118" r="26" fill="none" stroke="#7DF9FF" stroke-opacity="0.45" stroke-width="3"/>
</svg>
